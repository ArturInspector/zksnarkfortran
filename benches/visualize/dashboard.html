<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Fortran</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Main Dashboard</h1>
      <p class="subtitle">v 1.0 test</p>
    </header>

    <div class="controls">
      <div class="filter-group">
        <label for="operation-filter">Operation:</label>
        <select id="operation-filter">
          <option value="all">All operations</option>
          <option value="multilinear">Multilinear</option>
          <option value="univariate">Univariate</option>
          <option value="eq_polynomial">Equality Polynomial</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="metric-filter">Metric:</label>
        <select id="metric-filter">
          <option value="time">Time (ms)</option>
          <option value="throughput">Throughput (ops/s)</option>
          <option value="speedup">Speedup (x)</option>
        </select>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Rust Baseline</div>
        <div class="stat-value" id="rust-avg">-</div>
        <div class="stat-desc">Average time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fortran</div>
        <div class="stat-value" id="fortran-avg">-</div>
        <div class="stat-desc">Average time</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-label">Speedup</div>
        <div class="stat-value" id="speedup">-</div>
        <div class="stat-desc">Speedup</div>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="performance-chart"></canvas>
    </div>

    <div class="table-container">
      <table id="results-table">
        <thead>
          <tr>
            <th>Operation</th>
            <th>Size</th>
            <th>Rust (ms)</th>
            <th>Fortran (ms)</th>
            <th>Speedup</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="results-body">
          <!-- Data loaded via JavaScript -->
        </tbody>
      </table>
    </div>

    <footer>
      <p>Data loaded from <code>benches/results/</code></p>
      <p class="note"><code>cargo bench --bench polynomial-bench</code></p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
